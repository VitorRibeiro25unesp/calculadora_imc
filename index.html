<body>
  <div class="container" role="main">
    <h1>Calculadora de IMC</h1>

    <label for="peso">Peso (kg)</label>
    <input id="peso" type="number" step="0.1" min="0" placeholder="Ex: 70.5">

    <label for="altura">Altura (cm)</label>
    <input id="altura" type="number" step="0.1" min="0" placeholder="Ex: 175">

    <div class="row">
      <button id="calcularBtn">Calcular</button>
      <button id="limparCamposBtn" class="secondary">Limpar</button>
    </div>

    <div class="result" id="resultado" aria-live="polite" style="display:none;"></div>

    <div class="controls">
      <button id="limparHistoricoBtn" class="secondary">Limpar histórico</button>
      <div style="flex:1"></div>
    </div>

    <div class="muted">Histórico (salvo no seu navegador)</div>
    <div class="history" id="historico"></div>
  </div>

  <script>
    // Chave do localStorage
    const STORAGE_KEY = 'imc_history';

    // Elementos
    const pesoInput = document.getElementById('peso');
    const alturaInput = document.getElementById('altura');
    const calcularBtn = document.getElementById('calcularBtn');
    const limparCamposBtn = document.getElementById('limparCamposBtn');
    const limparHistoricoBtn = document.getElementById('limparHistoricoBtn');
    const resultadoEl = document.getElementById('resultado');
    const historicoEl = document.getElementById('historico');

    // Inicialização
    renderHistorico();

    // Eventos
    calcularBtn.addEventListener('click', () => {
      const peso = parseFloat(pesoInput.value);
      const alturaCm = parseFloat(alturaInput.value);

      if (!peso || !alturaCm) {
        showResultado('Por favor, preencha peso e altura válidos.', true);
        return;
      }

      const alturaM = alturaCm / 100;
      const imc = peso / (alturaM * alturaM);
      const imcFixed = parseFloat(imc.toFixed(2));
      const categoria = getCategoria(imcFixed);

      const texto = `IMC: ${imcFixed} — ${categoria}`;
      showResultado(texto, false);

      // Salvar no histórico
      salvarHistorico({
        id: Date.now(),
        peso: peso,
        alturaCm: alturaCm,
        imc: imcFixed,
        categoria: categoria,
        when: new Date().toISOString()
      });

      renderHistorico();
    });

    limparCamposBtn.addEventListener('click', () => {
      pesoInput.value = '';
      alturaInput.value = '';
      resultadoEl.style.display = 'none';
    });

    limparHistoricoBtn.addEventListener('click', () => {
      if (!confirm('Deseja realmente limpar todo o histórico?')) return;
      localStorage.removeItem(STORAGE_KEY);
      renderHistorico();
    });

    // Funções
    function showResultado(text, isError) {
      resultadoEl.style.display = 'block';
      resultadoEl.textContent = text;
      resultadoEl.style.background = isError ? 'rgba(255,0,0,0.12)' : 'rgba(255,255,255,0.15)';
    }

    function getCategoria(imc) {
      if (imc < 18.5) return 'Abaixo do peso';
      if (imc < 25) return 'Peso normal';
      if (imc < 30) return 'Sobrepeso';
      return 'Obesidade';
    }

    function salvarHistorico(entry) {
      const lista = carregarHistorico();
      lista.unshift(entry); // mais recente primeiro
      // limitar histórico a, por exemplo, 50 entradas
      if (lista.length > 50) lista.length = 50;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(lista));
    }

    function carregarHistorico() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch (e) {
        console.error('Erro ao ler histórico:', e);
        return [];
      }
    }

    function removerEntrada(id) {
      const lista = carregarHistorico().filter(item => item.id !== id);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(lista));
      renderHistorico();
    }

    function renderHistorico() {
      const lista = carregarHistorico();
      historicoEl.innerHTML = '';

      if (!lista.length) {
        historicoEl.innerHTML = '<div style="color:rgba(255,255,255,0.8); padding:6px;">Nenhum registro ainda.</div>';
        return;
      }

      lista.forEach(item => {
        const entry = document.createElement('div');
        entry.className = 'entry';

        const left = document.createElement('div');
        left.innerHTML = `<strong>${item.imc}</strong> — ${item.categoria}<br><small>${item.peso}kg • ${item.alturaCm}cm • ${formatDate(item.when)}</small>`;

        const delBtn = document.createElement('button');
        delBtn.textContent = 'Remover';
        delBtn.title = 'Remover esta entrada';
        delBtn.addEventListener('click', () => {
          if (confirm('Remover esta entrada do histórico?')) {
            removerEntrada(item.id);
          }
        });

        entry.appendChild(left);
        entry.appendChild(delBtn);
        historicoEl.appendChild(entry);
      });
    }

    function formatDate(iso) {
      try {
        const d = new Date(iso);
        return d.toLocaleString();
      } catch {
        return iso;
      }
    }
  </script>
