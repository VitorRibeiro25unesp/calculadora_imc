<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de IMC</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #e8f5e9; /* Leve tom verde */
    }
    .container {
      background: #04e73d;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      text-align: center;
      width: 350px;
    }
    .logo {
      width: 120px;
      margin-bottom: 15px;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 20px;
      color: #388e3c; /* Verde escuro */
    }
    label {
      display: block;
      margin: 10px 0 5px;
      font-weight: bold;
      color: #2e7d32; /* Verde médio */
    }
    input {
      width: 100%;
      padding: 8px;
      margin-bottom: 15px;
      border: 1px solid #c8e6c9; /* Verde claro */
      border-radius: 4px;
    }
    button {
      background-color: #4caf50; /* Verde principal */
      color: white;
      border: none;
      padding: 10px;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
      font-weight: bold;
    }
    button:hover {
      background-color: #388e3c; /* Verde escuro */
    }
    .result {
      margin-top: 15px;
      font-size: 18px;
      font-weight: bold;
      color: #1b5e20; /* Verde mais escuro */
    }
    .imc-table {
      margin-top: 20px;
      border-collapse: collapse;
      width: 100%;
    }
    .imc-table th, .imc-table td {
      border: 1px solid #c8e6c9;
      padding: 8px;
      text-align: center;
    }
    .imc-table th {
      background-color: #4caf50;
      color: white;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="https://via.placeholder.com/100?text=Saúde" alt="Logo Saúde" class="logo">
    <h1>Calculadora de IMC</h1>
    <label for="weight">Peso (kg):</label>
    <input type="number" id="weight" placeholder="Ex: 70" />

    <label for="height">Altura (m):</label>
    <input type="number" id="height" placeholder="Ex: 1.75" step="0.01" />

    <button onclick="calculateIMC()">Calcular IMC</button>
    <div class="result" id="result"></div>

    <table class="imc-table">
      <thead>
        <tr>
          <th>Classificação</th>
          <th>IMC</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Abaixo do peso</td>
          <td>Menor que 18.5</td>
        </tr>
        <tr>
          <td>Peso normal</td>
          <td>18.5 - 24.9</td>
        </tr>
        <tr>
          <td>Sobrepeso</td>
          <td>25 - 29.9</td>
        </tr>
        <tr>
          <td>Obesidade Grau 1</td>
          <td>30 - 34.9</td>
        </tr>
        <tr>
          <td>Obesidade Grau 2</td>
          <td>35 - 39.9</td>
        </tr>
        <tr>
          <td>Obesidade Grau 3</td>
          <td>Maior ou igual a 40</td>
        </tr>
      </tbody>
    </table>
  </div>

  <script>
    function calculateIMC() {
      const weight = parseFloat(document.getElementById('weight').value);
      const height = parseFloat(document.getElementById('height').value);
      const resultDiv = document.getElementById('result');

      if (isNaN(weight) || isNaN(height) || weight <= 0 || height <= 0) {
        resultDiv.textContent = "Por favor, insira valores válidos.";
        return;
      }

      const imc = weight / (height * height);
      let classification = "";

      if (imc < 18.5) {
        classification = "Abaixo do peso";
      } else if (imc < 25) {
        classification = "Peso normal";
      } else if (imc < 30) {
        classification = "Sobrepeso";
      } else if (imc < 35) {
        classification = "Obesidade Grau 1";
      } else if (imc < 40) {
        classification = "Obesidade Grau 2";
      } else {
        classification = "Obesidade Grau 3";
      }

      resultDiv.textContent = `Seu IMC é ${imc.toFixed(2)} (${classification})`;
    }
  </script>
</body>
</html>
